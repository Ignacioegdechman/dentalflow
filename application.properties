# JWT
jwt.secret=${JWT_SECRET:mi_clave_super_secreta_12345678901234567890}
jwt.expiration-ms=${JWT_EXPIRATION_MS:36000000}

# DB
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/dentalflow}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:Luna sol}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.open-in-view=false

# Mail / recordatorios
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:25}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:false}

app.recordatorios.enabled=${APP_RECORDATORIOS_ENABLED:false}
app.recordatorios.horas=${APP_RECORDATORIOS_HORAS:24}
app.recordatorios.cron=${APP_RECORDATORIOS_CRON:0 0 * * * *}
app.whatsapp.webhook-token=${APP_WHATSAPP_WEBHOOK_TOKEN:dev-whatsapp-token}
app.whatsapp.cloud-enabled=${APP_WHATSAPP_CLOUD_ENABLED:false}
app.whatsapp.api-base=${APP_WHATSAPP_API_BASE:https://graph.facebook.com/v21.0}
app.whatsapp.phone-number-id=${APP_WHATSAPP_PHONE_NUMBER_ID:}
app.whatsapp.access-token=${APP_WHATSAPP_ACCESS_TOKEN:}
app.whatsapp.signature-enabled=${APP_WHATSAPP_SIGNATURE_ENABLED:false}
app.whatsapp.app-secret=${APP_WHATSAPP_APP_SECRET:}

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=never

info.app.name=Dentalflow
info.app.description=Backend para consultorio odontologico

